spring.application.name=shopee-backend
server.port=8081

#DB configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/shopee_db
spring.datasource.username=postgres
spring.datasource.password=root

#JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
    
# Initialize a database with schema and data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Configuration (change jwt.secret to a strong Base64-encoded 256-bit key in production)
jwt.secret=bXlTZWNyZXRLZXkxMjM0NTY3ODlteVNlY3JldEtleTEyMzQ1Njc4OW15U2VjcmV0S2V5
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Email Configuration (configure your SMTP server)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@shopee.com

# Disable security auto-config (we handle it manually)
spring.security.user.name=admin
spring.security.user.password=disabled

# CORS - allowed origins for the frontend dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging levels
logging.level.com.shopee=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator - expose health and info endpoints only
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

